[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "control-plane-kit-interpreters"
version = "0.1.0"
description = "Concrete runtime interpreters for Control Plane Kit"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "OpenJ92" }
]
dependencies = []

[project.optional-dependencies]
docker = [
  "docker>=7.1",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
control_plane_kit_interpreters = ["py.typed"]
