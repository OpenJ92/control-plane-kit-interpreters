[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "control-plane-kit-interpreters"
version = "0.1.0"
description = "Concrete runtime interpreters for Control Plane Kit"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "OpenJ92" }
]
dependencies = [
  "control-plane-kit-core @ https://github.com/OpenJ92/control-plane-kit/archive/594f88c95373ae1fe134c069bd8f694f87750cca.zip#subdirectory=control-plane-kit-core",
]

[project.optional-dependencies]
docker = [
  "docker>=7.1",
]
http = [
  "httpx>=0.28",
]
test = [
  "docker>=7.1",
  "httpx>=0.28",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
control_plane_kit_interpreters = ["py.typed"]
